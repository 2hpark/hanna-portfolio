<!DOCTYPE html>
<html lang="en-ca">
  <head>
    <title>Hanna Park's Creative Space</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Englebert&family=Henny+Penny&display=swap" rel="stylesheet">
    
    <style>
      /*
      .henny-penny-regular {
      font-family: "Henny Penny", system-ui;

      body {
        
      }
      .wrapper {
      width: 1200px;
      margin: 0 auto;
      background: white;
      }
      
      nav {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      }

      nav ul {
      list-style: none;
      display: flex;
      gap: 60px;
      margin: 0;
      padding: 0;
      padding-right: 40px;
      padding-top: 20px;
      margin-left: auto
      }

      nav ul a {
      text-decoration: none;
      font-family: "Englebert", sans-serif;
      color: #DB5893;
      background:#D0EDEF;
      /*border: 2px solid lightblue;*/
      padding: 5px 12px;
      font-size: 1.5em;
      }
      
      h1 {
        font-family: "Henny Penny", serif;
        font-size: 75px;
      }
      
      h2 {
        font-family: "Henny Penny", serif;
        font-size: 45px;
      }
      
      #hero {
      position: relative; /*AI (Claude) Assisted*/
      margin-top: -80px;
      }

      #hero-text {
      position: absolute; /* lifts the text out of the normal flow */
      top: 0;
      left: 0;
      padding: 100px;
      padding-top: 170px;
      z-index: 1; /* makes sure text sits on top of the image */
      }

      #hero-image {
      width: 60%;
      display: block;
      margin-left: auto;
      }
      
      #section {
      position: relative; /*AI (Claude) Assisted*/
      background: #D0EDEF;
      }
      
      .circle {
      border-radius: 50%;
      position: absolute;
      }

      .circle.teal {
      width: 80px;
      height: 80px;
      background-color: #D0EDEF;
      top: 400px;
      left: 0px;
      }

      .circle.yellow {
      width: 40px;
      height: 40px;
      background-color: #F1FF94;
      top: 370px;
      left: 260px;
      }

      .circle.pink {
      width: 50px;
      height: 50px;
      background-color: #DB5893;
      top: 190px;
      left: 640px;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
    <nav>
      <!--<div id="logo">HP</div>-->
      <ul>
        <li style="transform: rotate(4deg);"><a href="about.html">About Me</a></li>
        <li style="transform: rotate(-4deg);"><a href="arts.html">My Arts</a></li>
        <li style="transform: rotate(2deg);"><a href="photos.html">Photos</a></li>
      </ul>
    </nav>
    
    <div id="hero">
      <div id="hero-text">
          <h2 style="color: #733362;">Hanna Park's</h2>
          <h1 style="color: #733362; padding-left: 50px; margin-top: -80px;">Creative Space</h1>
      </div>
      <img id="hero-image" src="content/Homepage_Art.png" alt="girl with a skirt">
      <div class="circle teal"></div>
      <div class="circle yellow"></div>
      <div class="circle pink"></div>
    </div>
    </div>
  </body>
</html>
