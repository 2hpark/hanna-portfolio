<!DOCTYPE html>
<html lang="en-ca">
  <head>
    <title>Hanna Park's Creative Space</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Englebert&family=Henny+Penny&display=swap" rel="stylesheet">
    
    <style>

      body {
        background: #F1FF94;
      }
      .wrapper {
      width: 1200px;
      margin: 0 auto;
      background: white;
      }
      
      nav {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
      }
      
      #logo img {
      height: 60px; /* adjust this to whatever size looks right */
      width: auto;
      transition: transform 0.2s ease;
      }

      #logo img:hover {
      transform: scale(1.1);
      }

      #logo {
      text-decoration: none;
      }

      nav ul {
      list-style: none;
      display: flex;
      gap: 60px;
      margin: 0;
      padding: 0;
      padding-right: 40px;
      padding-top: 20px;
      margin-left: auto
      }

      nav ul a {
      text-decoration: none;
      font-family: "Englebert", sans-serif;
      color: #DB5893;
      background: #D0EDEF;
      /*border: 2px solid lightblue;*/
      padding: 5px 12px;
      font-size: 1.5em;
      display: inline-block; /* ← add this */
      transition: transform 0.2s ease; /* ← add this */
      }
      
      nav ul a:hover {
      transform: scale(1.1); /* gets 20% bigger on hover */
      }
      
      h1 {
        font-family: "Henny Penny", serif;
        font-size: 75px;
      }
      
      h2 {
        font-family: "Henny Penny", serif;
        font-size: 45px;
      }
      
      #hero {
      position: relative; /*AI (Claude) Assisted*/
      margin-top: -80px;
      }

      #hero-text {
      position: absolute; /* lifts the text out of the normal flow */
      top: 0;
      left: 0;
      padding: 100px;
      padding-top: 170px;
      z-index: 1; /* makes sure text sits on top of the image */
      }

      #hero-image {
      width: 60%;
      display: block;
      margin-left: auto;
      }
         
      #section {
      position: relative;
      background: #D0EDEF;
      height: 250px;
      }
      
      .circle {
      border-radius: 50%;
      position: absolute;
      }

      .circle.teal {
      width: 80px;
      height: 80px;
      background-color: #D0EDEF;
      top: 400px;
      left: 0px;
      }

      .circle.yellow {
      width: 40px;
      height: 40px;
      background-color: #F1FF94;
      top: 370px;
      left: 260px;
      }

      .circle.pink {
      width: 50px;
      height: 50px;
      background-color: #DB5893;
      top: 190px;
      left: 640px;
      }
      
      .circle.purple {
      width: 50px;
      height: 50px;
      background-color: #733362;
      top: 650px;
      left: 140px;
      }
      
      #clothing-section {
      text-align: center;
      padding: 60px 20px;
      }

      #hover-hint {
      color: #DB5893;
      font-family: "Englebert", cursive;
      font-size: 1.5em;
      margin-bottom: 10px;
      }

      .clothing-container {
      display: flex;
      justify-content: center;
      gap: 60px;
      align-items: flex-end;
      }

      .clothing-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.3s ease;
      position: relative; 
      }

      .clothing-item img {
      width: 300px;
      transition: transform 0.3s ease;
      }
      
      /* AI (CLaude) Assisted */
      .clothing-label {
      position: absolute; 
      top: 50%; 
      left: 50%;
      transform: translate(-50%, -50%); 
      opacity: 0;
      color: #DB5893;
      font-family: "Englebert", cursive;
      font-size: 2em;
      background: white; 
      padding: 5px 12px;
      transition: opacity 0.3s ease;
      white-space: nowrap; 
      z-index: 2;
      }

      .clothing-item:hover img {
      transform: rotate(10deg) scale(1.2);
      }

      .clothing-item:hover .clothing-label {
      opacity: 1;
      }
      
     footer {
      display: flex;
      justify-content: center; 
      align-items: flex-start;
      padding: 40px;
      background: #F1FF94;
      margin-top: 60px;
      gap: 150px;
      }

      #footer-logo img {
      height: 80px;
      width: auto;
      }

      #footer-links, #footer-contact {
      display: flex;
      flex-direction: column;
      gap: 8px;
      }

      #footer-links h3, #footer-contact h3 {
      font-family: "Henny Penny", serif;
      color: #733362;
      font-size: 1.2em;
      margin-bottom: 5px;
      }

      #footer-links a, #footer-contact a {
      font-family: "Englebert", cursive;
      color: #DB5893;
      text-decoration: none;
      font-size: 1em;
      transition: transform 0.2s ease;
      display: inline-block;
      }

      #footer-links a:hover, #footer-contact a:hover {
      transform: scale(1.05);
      color: #B872A5; 
      }
      
      #footer-links a:visited, #footer-contact a:visited {
      color: #733362; 
      }
      
    </style>
  </head>
  <body>
    <div class="wrapper">
    <nav>
      <a href="index.html" id="logo">
        <img src="content/logo.png" alt="HP logo">
      </a>
      <ul>
        <li style="transform: rotate(4deg);"><a href="about.html">About Me</a></li>
        <li style="transform: rotate(-4deg);"><a href="my_art.html">My Arts</a></li>
        <li style="transform: rotate(2deg);"><a href="photos.html">Photos</a></li>
      </ul>
    </nav>
    
    <div id="hero">
      <div id="hero-text">
          <h2 style="color: #733362;">Hanna Park's</h2>
          <h1 style="color: #733362; padding-left: 50px; margin-top: -80px;">Playground</h1>
      </div>
      <img id="hero-image" src="content/Homepage_Art.png" alt="girl with a skirt">
      <div class="circle teal"></div>
      <div class="circle yellow"></div>
      <div class="circle pink"></div>
      <div class="circle purple"></div>
      </div>
    <div id="clothing-section">
  <p id="hover-hint">Choose a clothing item!</p>
  <div class="clothing-container">
    
    <a href="my_art.html" class="clothing-item">
      <img src="content/dress.png" alt="shirt">
      <p class="clothing-label">My Art</p>
    </a>

    <a href="photos.html" class="clothing-item">
      <img src="content/shirt.png" alt="shirt" style="width:350px">
      <p class="clothing-label">Photos</p>
    </a>

    <a href="about.html" class="clothing-item">
      <img src="content/socks.png" alt="socks">
      <p class="clothing-label">About Me</p>
    </a>

  </div>
      <footer>
  <div id="footer-logo">
    <img src="content/logo.png" alt="HP logo">
  </div>
  
  <div id="footer-links">
    <h3>Navigate</h3>
    <a href="index.html">Home</a>
    <a href="about.html">About Me</a>
    <a href="my_art.html">My Arts</a>
    <a href="photos.html">Photos</a>
  </div>

  <div id="footer-contact">
    <h3>Contact</h3>
    <a href="mailto:hannainthepark@gmail.com">Email</a>
    <a href="https://www.linkedin.com/in/hanna-park-453b66354/" target="_blank">LinkedIn</a>
  </div>

</footer>
</div>
      
    </div>
  </body>
</html>
