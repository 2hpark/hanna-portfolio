<!DOCTYPE html>

    <style>
      body {

      nav {

      align-items: center;

      nav ul a {

      background:#D0EDEF;
      /*border: 2px solid lightblue;*/

      font-size: 1.5em;
      display: inline-block; /* ← add this */
      transition: transform 0.2s ease; /* ← add this */
      }
      
      nav ul a:hover {
      transform: scale(1.1); /* gets 20% bigger on hover */
      }
      
      /* AI (Claude) Assisted */
      nav ul a.current {

      }
      
      h1 {
        font-family: "Henny Penny", serif;
        font-size: 75px;
      }
      
      h2 {
        font-family: "Henny Penny", serif;
        font-size: 34px;
        text-align: center;
        line-height: 1;
      }
      
      #hero {
      position: relative; /*AI (Claude) Assisted*/
      margin-top: -130px;
      overflow: hidden;
      }

      #hero-text1 {
      position: absolute;
      top: 4%;
      right: 45%;
      padding: 90px;
      padding-top: 170px;
      z-index: 1; /*AI (Claude) Assisted*/
      margin-top: 0px;
      }
      
      #hero-text2 {
      position: absolute;
      top: 15%;
      right: 20%;
      padding: 250px;
      padding-top: 170px;
      z-index: 1; /*AI (Claude) Assisted*/

      }

      #hero-image {
      width: 115%;
      display: block;
      margin-right: auto;
      margin-left: -130px; 
      }
      
      .circle {
      border-radius: 50%;

      }

      .circle.teal {
      width: 80px;

      }

      .circle.yellow {
      width: 40px;
      height: 40px;
      background-color: #F1FF94;
      top: 730px;
      right: 200px;
      }
      
      .circle.yellow2 {
      width: 40px;
      height: 40px;
      background-color: #F1FF94;
      top: 430px;
      left: 300px;
      }

      .circle.pink {
      width: 40px;
      height: 40px;
      background-color: #DB5893;
      top: 270px;

      .circle.pink2 {
      width: 47px;

      }
      
      
   #photo-viewer {
  display: flex;
  height: 700px;
  margin: 40px 0;
  gap: 0;
  width: 100%; /* make sure it fits inside wrapper */
  overflow: hidden; /* prevent sidebar from spilling out */
}

/* LEFT SIDE - main preview + thumbnails */
#photo-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #f5f5f5;
  border: 1px solid #eee;
}

#photo-preview {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}

#photo-preview img {
  max-height: 100%;
  max-width: 100%;
  object-fit: contain;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}

/* THUMBNAIL STRIP */
#thumbnail-strip {
  height: 100px;
  display: flex;
  gap: 8px;
  padding: 10px;
  overflow-x: scroll; /* change auto to scroll so scrollbar always shows */
  background: #eee;
  align-items: center;
  scroll-behavior: smooth;
  background: #D0EDEF;
  /* style the scrollbar */
  scrollbar-width: thin;
  scrollbar-color: #DB5893 #eee;
}

/* for Chrome */
#thumbnail-strip::-webkit-scrollbar {
  height: 6px;
}
#thumbnail-strip::-webkit-scrollbar-thumb {
  background: #DB5893;
  border-radius: 3px;
}

#thumbnail-strip img {
  height: 75px;
  width: auto;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.2s ease;
  flex-shrink: 0;
  border: 2px solid transparent;
}

#thumbnail-strip img:hover,
#thumbnail-strip img.active {
  opacity: 1;
  border: 2px solid #DB5893;
}

/* RIGHT SIDEBAR */
#photo-sidebar {
  width: 200px;
  border-left: 1px solid #eee;
  padding: 20px;
  overflow-y: auto;
  margin-top: 0px;
}

#photo-sidebar h3 {
  font-family: "Englebert", cursive;
  color: #DB5893;
  font-size: 1em;
  margin-bottom: 15px;
  border-bottom: 1px solid #D0EDEF;
  padding-bottom: 5px;
}

.album-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: white;
  border: none;
  font-family: "Englebert", cursive;
  color: #733362;
  font-size: 1em;
  padding: 8px 5px;
  cursor: pointer;
  border-bottom: 1px solid #f0f0f0;
  transition: color 0.2s ease, background 0.2s ease;
}

.album-btn:hover,
.album-btn.active {
  color: #DB5893;
  background: #f9f0f5;
}

  </head>
  <body>
    <div class="wrapper">
    <nav>
      <a href="index.html" id="logo">
        <img src="content/logo.png" alt="HP logo">
      </a>
      <ul>
        <li style="transform: rotate(4deg);"><a href="about.html">About Me</a></li>
        <li style="transform: rotate(-4deg);"><a href="my_art.html">My Arts</a></li>
        <li style="transform: rotate(2deg);"><a href="photos.html" class="current">Photos</a></li>
      </ul>
    </nav>
    
    <div id="hero">
      <div id="hero-text1">
          <h1 style="color: #B872A5; padding-left: 50px; margin-top: 80px;">Lets Explore!</h1>
      </div>
      <div id="hero-text2">
        <h2 style="color: #B872A5; padding-left: 160px; margin-top: 80px; transform: rotate(-8deg);">my world through my camera</h2> 
      </div>
      <img id="hero-image" src="content/PhotosHeader.png" alt="girl with a skirt">
      <div class="circle teal"></div>
      <div class="circle teal2"></div>
      <div class="circle yellow"></div>
      <div class="circle yellow2"></div>
      <div class="circle pink"></div>
      <div class="circle pink2"></div>
      </div>
      
      
<div id="photo-viewer">

  <!-- Left: main view + thumbnails -->
  <div id="photo-main">
    <div id="photo-preview">
      <img id="main-photo" src="content/photo1.jpg" alt="hello">
    </div>
    <div id="thumbnail-strip">
      <!-- thumbnails injected by JS -->
    </div>
  </div>

  <!-- Right: sidebar -->
  <div id="photo-sidebar">
    <h3 style="color: #733362; font-family: 'Henny Penny', serif;">Albums</h3>
    <button class="album-btn active" onclick="loadAlbum('street')">Landscapes</button>
    <button class="album-btn" onclick="loadAlbum('nature')">Night time</button>
    <button class="album-btn" onclick="loadAlbum('portraits')">Sights</button>
    <button class="album-btn" onclick="loadAlbum('travel')">Food</button>
  </div>

</div>

  </div>     
    
    
    <script>
  // Define your albums here — add your real image paths
  const albums = {
    street: [
      'content/novascotia ocean.jpg',
      'content/landscape1.jpg',
      'content/landscape2.JPG',
      'content/beach house.JPG',
      'content/big tree.JPG',
      'content/ocean.png',
      'content/fish in river.JPG',
      'content/stlucia car.JPG',
      'content/nova scotia field2.jpg',
      
      /*'content/nova scotia field.jpg',
      'content/sea shells.JPG',*/
    ],
    nature: [
      'content/moon.JPG',
      'content/tree on lake.JPG',
      'content/rainy window.JPG',
      'content/purple blue trees.JPG',
      'content/car window.JPG',
      'content/dark road.JPG',
      'content/dark road2.JPG',
    ],
    portraits: [
      'content/korea.JPG',
      'content/korea2.JPG',
      'content/korea3.JPG',
      'content/akihabara.JPG',
      'content/japan.JPG',
      'content/lake1.JPG',
      'content/lake2.JPG',
      'content/toronto skyline.JPG',
      'content/sea shells.JPG',
    ],
    travel: [
      'content/smash burgers.JPG',
      'content/toast.JPG',
      'content/udon.JPG',
      'content/ramen.JPG',
      'content/birria.JPG',
      'content/crab.JPG',
      'content/sashimi.JPG',
      'content/vanilla pancake.JPG',
      'content/matcha pancake.JPG',
    ]
  };

  const mainPhoto = document.getElementById('main-photo');
  const thumbnailStrip = document.getElementById('thumbnail-strip');

  function loadAlbum(albumName) {
    // update active sidebar button
    document.querySelectorAll('.album-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    // load thumbnails
    const photos = albums[albumName];
    thumbnailStrip.innerHTML = '';
    photos.forEach((src, index) => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = 'photo';
      if (index === 0) {
        img.classList.add('active');
        mainPhoto.src = src; // show first photo
      }
      img.addEventListener('click', () => {
        document.querySelectorAll('#thumbnail-strip img').forEach(t => t.classList.remove('active'));
        img.classList.add('active');
        mainPhoto.src = src;
      });
      thumbnailStrip.appendChild(img);
    });
  }

  // load first album on page load
  document.querySelector('.album-btn').click();
</script>
    
    
  </body>
