<!DOCTYPE html>
<html lang="en-ca">
  <head>
    <title>Hanna Park's Creative Space</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Englebert&family=Henny+Penny&display=swap" rel="stylesheet">
    
    <style>
      body {
      background: #F1FF94;
      }
      .wrapper {
      width: 1200px;
      margin: 0 auto;
      background: white;
      }
      
      nav {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
      }
      
      #logo img {
      height: 60px; 
      width: auto;
      transition: transform 0.2s ease;
      float: left;
      }

      #logo img:hover {
      transform: scale(1.1);
      }

      #logo {
      text-decoration: none;
      }

      nav ul {
      list-style: none;
      display: flex;
      gap: 60px;
      margin: 0;
      padding: 0;
      padding-right: 40px;
      padding-top: 20px;
      margin-left: auto
      }

      nav ul a {
      text-decoration: none;
      font-family: "Englebert", sans-serif;
      color: #DB5893;
      background:#D0EDEF;
      padding: 5px 12px;
      font-size: 1.5em;
      display: inline-block; 
      transition: transform 0.2s ease; 
      }
      
      nav ul a:hover {
      transform: scale(1.1);
      }

      nav ul a.current {
      background: #DB5893; 
      color: white;
      }
      
      h1 {
        font-family: "Henny Penny", serif;
        font-size: 75px;
      }
      
      h2 {
        font-family: "Henny Penny", serif;
        font-size: 34px;
        text-align: center;
        line-height: 1;
      }
      
      #hero {
      position: relative; 
      margin-top: -130px;
      overflow: hidden;
      }

      #hero-text1 {
      position: absolute;
      top: 4%;
      right: 45%;
      padding: 90px;
      padding-top: 170px;
      z-index: 1; 
      margin-top: 0px;
      }
      
      #hero-text2 {
      position: absolute;
      top: 15%;
      right: 20%;
      padding: 250px;
      padding-top: 170px;
      z-index: 1; 
      margin-top: 0px;
      }

      #hero-image {
      width: 115%;
      display: block;
      margin-right: auto;
      margin-left: -130px; 
      }
      
      .circle {
      border-radius: 50%;
      position: absolute;
      }

      .circle.teal {
      width: 80px;
      height: 80px;
      background-color: #D0EDEF;
      top: 200px;
      left: 10px;
      }
      
      .circle.teal2 {
      width: 80px;
      height: 80px;
      background-color: #D0EDEF;
      top: 450px;
      right: 170px;
      }

      .circle.yellow {
      width: 40px;
      height: 40px;
      background-color: #F1FF94;
      top: 730px;
      right: 200px;
      }
      
      .circle.yellow2 {
      width: 40px;
      height: 40px;
      background-color: #F1FF94;
      top: 430px;
      left: 300px;
      }

      .circle.pink {
      width: 40px;
      height: 40px;
      background-color: #DB5893;
      top: 270px;
      right: 30px;
      }
      
      .circle.pink2 {
      width: 47px;
      height: 47px;
      background-color: #DB5893;
      top: 640px;
      left: 190px;
      }
      
      /* AI (Claude) Assisted */
      #photo-viewer {
      display: flex;
      height: 700px;
      margin-top: -340px; 
      gap: 0;
      width: 100%;
      overflow: hidden;
      position: relative; 
      z-index: 2; 
      }


      #photo-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f5f5f5;
      border: 1px solid #eee;
      }

      #photo-preview {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      }

      #photo-preview img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      }

      #thumbnail-strip {
      height: 100px;
      display: flex;
      gap: 8px;
      padding: 10px;
      overflow-x: scroll; 
      background: #eee;
      align-items: center;
      scroll-behavior: smooth;
      background: #D0EDEF;
      scrollbar-width: thin;
      scrollbar-color: #DB5893 #eee;
      }

      #thumbnail-strip img {
      height: 75px;
      width: auto;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s ease;
      flex-shrink: 0;
      border: 2px solid transparent;
      }

      #thumbnail-strip img:hover,
      #thumbnail-strip img.active {
      opacity: 1;
      border: 2px solid #DB5893;
      }


      #photo-sidebar {
      width: 200px;
      border-left: 1px solid #eee;
      padding: 20px;
      overflow-y: auto;
      margin-top: 0px;
      background: white;
      }

      #photo-sidebar h3 {
      font-family: "Englebert", cursive;
      color: #DB5893;
      font-size: 1em;
      margin-bottom: 15px;
      border-bottom: 1px solid #D0EDEF;
      padding-bottom: 5px;
      }

      .album-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: white;
      border: none;
      font-family: "Englebert", cursive;
      color: #733362;
      font-size: 1em;
      padding: 8px 5px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: color 0.2s ease, background 0.2s ease;
      }

      .album-btn:hover,
      .album-btn.active {
      color: #DB5893;
      background: #f9f0f5;
      }
    
       footer {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px;
      background: #F1FF94;
      margin-top: 60px;
      gap: 150px;
      margin-left: 40px; 
      margin-right: 40px; 
      margin-bottom: 40px; 
      }

      #footer-logo img {
      height: 80px;
      width: auto;
      }

      #footer-links, #footer-contact {
      display: flex;
      flex-direction: column;
      gap: 8px;
      }

      #footer-links h3, #footer-contact h3 {
      font-family: "Henny Penny", serif;
      color: #733362;
      font-size: 1.2em;
      margin-bottom: 5px;
      }

      #footer-links a, #footer-contact a {
      font-family: "Englebert", cursive;
      color: #DB5893;
      text-decoration: none;
      font-size: 1em;
      transition: transform 0.2s ease;
      display: inline-block;
      }

      #footer-links a:hover, #footer-contact a:hover {
      transform: scale(1.05);
      color: #B872A5; 
      }
      
      #footer-links a:visited, #footer-contact a:visited {
      color: #733362; 
      }
      
    </style>
  </head>
  <body>
    <div class="wrapper">
    <nav>
      <a href="index.html" id="logo">
        <img src="content/logo.png" alt="HP logo">
      </a>
      <ul>
        <li style="transform: rotate(4deg);"><a href="about.html">About Me</a></li>
        <li style="transform: rotate(-4deg);"><a href="my_art.html">My Arts</a></li>
        <li style="transform: rotate(2deg);"><a href="photos.html" class="current">Photos</a></li>
      </ul>
    </nav>
    
    <div id="hero">
      <div id="hero-text1">
          <h1 style="color: #B872A5; padding-left: 50px; margin-top: 80px;">Lets Explore!</h1>
      </div>
      <div id="hero-text2">
        <h2 style="color: #B872A5; padding-left: 160px; margin-top: 80px; transform: rotate(-8deg);">my world through my camera</h2> 
      </div>
      <img id="hero-image" src="content/PhotosHeader.png" alt="girl with a skirt">
      <div class="circle teal"></div>
      <div class="circle teal2"></div>
      <div class="circle yellow"></div>
      <div class="circle yellow2"></div>
      <div class="circle pink"></div>
      <div class="circle pink2"></div>
      </div>
      
      
<div id="photo-viewer">
  <div id="photo-main">
    <div id="photo-preview">
      <img id="main-photo" src="content/photo1.jpg" alt="hello">
    </div>
    <div id="thumbnail-strip">
    </div>
  </div>

  <!-- Right sidebar -->
  <div id="photo-sidebar">
    <h3 style="color: #733362; font-family: 'Henny Penny', serif;">Albums</h3>
    <button class="album-btn active" onclick="loadAlbum('street')">Landscapes</button>
    <button class="album-btn" onclick="loadAlbum('nature')">Night time</button>
    <button class="album-btn" onclick="loadAlbum('portraits')">Sights</button>
    <button class="album-btn" onclick="loadAlbum('travel')">Food</button>
  </div>
</div>

  <footer>
    <div id="footer-logo">
      <img src="content/logo.png" alt="HP logo">
    </div>
  
    <div id="footer-links">
      <h3>Navigate</h3>
      <a href="index.html">Home</a>
      <a href="about.html">About Me</a>
      <a href="my_art.html">My Arts</a>
      <a href="photos.html">Photos</a>
    </div>

    <div id="footer-contact">
      <h3>Contact</h3>
      <a href="mailto:hannainthepark@gmail.com">Email</a>
      <a href="https://www.linkedin.com/in/hanna-park-453b66354/" target="_blank">LinkedIn</a>
    </div>

  </footer>
  </div>      
  
    <!-- AI (Claude) Assisted -->
    <script>
    const albums = {
    street: [
      'content/novascotia ocean.jpg',
      'content/landscape1.jpg',
      'content/landscape2.JPG',
      'content/beach house.JPG',
      'content/big tree.JPG',
      'content/ocean.png',
      'content/fish in river.JPG',
      'content/stlucia car.JPG',
      'content/nova scotia field2.jpg',
    
    ],
    nature: [
      'content/moon.JPG',
      'content/tree on lake.JPG',
      'content/rainy window.JPG',
      'content/purple blue trees.JPG',
      'content/car window.JPG',
      'content/dark road.JPG',
      'content/dark road2.JPG',
    ],
    portraits: [
      'content/korea.JPG',
      'content/korea2.JPG',
      'content/korea3.JPG',
      'content/akihabara.JPG',
      'content/japan.JPG',
      'content/lake1.JPG',
      'content/lake2.JPG',
      'content/toronto skyline.JPG',
      'content/sea shells.JPG',
    ],
    travel: [
      'content/smash burgers.JPG',
      'content/toast.JPG',
      'content/udon.JPG',
      'content/ramen.JPG',
      'content/birria.JPG',
      'content/crab.JPG',
      'content/sashimi.JPG',
      'content/vanilla pancake.JPG',
      'content/matcha pancake.JPG',
    ]
    };

  const mainPhoto = document.getElementById('main-photo');
  const thumbnailStrip = document.getElementById('thumbnail-strip');

  function loadAlbum(albumName) {
    // update active sidebar button
    document.querySelectorAll('.album-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    // load thumbnails
    const photos = albums[albumName];
    thumbnailStrip.innerHTML = '';
    photos.forEach((src, index) => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = 'photo';
      if (index === 0) {
        img.classList.add('active');
        mainPhoto.src = src; // show first photo
      }
      img.addEventListener('click', () => {
        document.querySelectorAll('#thumbnail-strip img').forEach(t => t.classList.remove('active'));
        img.classList.add('active');
        mainPhoto.src = src;
      });
      thumbnailStrip.appendChild(img);
    });
  }

  // load first album on page load
  document.querySelector('.album-btn').click();
  </script>
</body>
</html>
