<!DOCTYPE html>
<html lang="en-ca">
  <head>
    <title>Hanna Park's Creative Space</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Englebert&family=Henny+Penny&display=swap" rel="stylesheet">
    
    <style>
      body {
        background: #F1FF94;
      }
      .wrapper {
      width: 1200px;
      margin: 0 auto;
      background: white;
      }
      
      nav {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      }

      nav ul {
      list-style: none;
      display: flex;
      gap: 60px;
      margin: 0;
      padding: 0;
      padding-right: 40px;
      padding-top: 20px;
      margin-left: auto
      }

      nav ul a {
      text-decoration: none;
      font-family: "Englebert", sans-serif;
      color: #DB5893;
      background:#D0EDEF;
      /*border: 2px solid lightblue;*/
      padding: 5px 12px;
      font-size: 1.5em;
      }
      
      h1 {
        font-family: "Henny Penny", serif;
        font-size: 75px;
      }
      
      h2 {
        font-family: "Henny Penny", serif;
        font-size: 45px;
      }
      
      #hero {
      position: relative; /*AI (Claude) Assisted*/
      margin-top: -130px;
      }

      #hero-text {
      position: absolute; /* lifts the text out of the normal flow */
      top: 0;
      right: 30%;
      padding: 100px;
      padding-top: 170px;
      z-index: 1; /*AI (Claude) Assisted*/
      margin-top: 160px;
      }

      #hero-image {
      width: 80%;
      display: block;
      margin-right: auto;
      margin-left: -130px;
      }

    </style>
  </head>
  <body>
    <div class="wrapper">
    <nav>
      <!--<div id="logo">HP</div>-->
      <ul>
        <li style="transform: rotate(4deg);"><a href="about.html">About Me</a></li>
        <li style="transform: rotate(-4deg);"><a href="arts.html">My Arts</a></li>
        <li style="transform: rotate(2deg);"><a href="photos.html">Photos</a></li>
      </ul>
    </nav>
    
    <div id="hero">
      <div id="hero-text">
          <h1 style="color: #733362; padding-left: 50px; margin-top: 80px;">My Art</h1>
      </div>
      <img id="hero-image" src="content/MyArt_Art.png" alt="girl with a skirt">
      </div>

  </div>     
  </body>
</html>
